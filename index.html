<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soberano Builder | Panel Maestro</title>
    <style>
        :root { --gold: #D4AF37; --dark-bg: #0a0a0a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .builder-container { max-width: 850px; width: 100%; background: linear-gradient(145deg, #1a1a1a, #000); border: 2px solid var(--gold); border-radius: 20px; padding: 30px; box-shadow: 0 0 30px rgba(212, 175, 55, 0.2); box-sizing: border-box; }
        h1 { color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid var(--gold); padding-bottom: 15px; margin-top: 0; }
        .section { margin-bottom: 25px; padding: 20px; border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 15px; background: var(--glass); }
        label { color: var(--gold); font-size: 0.8rem; font-weight: bold; display: block; margin-bottom: 8px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--gold); background: #000; color: #fff; outline: none; box-sizing: border-box; margin-bottom: 15px; }
        .grid-horarios { display: grid; grid-template-columns: 100px 1fr 1fr; gap: 15px; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.1); padding: 10px 0; }
        .btn-generar { background: transparent; color: var(--gold); border: 2px solid var(--gold); padding: 20px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.4s; font-size: 1rem; box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2); }
        .btn-generar:hover { background: var(--gold); color: #000; box-shadow: 0 0 30px var(--gold); }
        #codigo_salida { width: 100%; height: 250px; margin-top: 25px; background: #050505; color: #00ff41; font-family: 'Courier New', monospace; border: 1px solid #444; padding: 15px; border-radius: 10px; display: none; box-sizing: border-box; }
        .copy-info { color: #D4AF37; text-align: center; margin-top: 10px; display: none; font-weight: bold; animation: fade 1.5s infinite; }
        @keyframes fade { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

    <div class="builder-container">
        <h1>🛠️ PANEL MAESTRO SOBERANO</h1>
        
        <div class="section">
            <label>Nombre del Negocio:</label>
            <input type="text" id="nombre_negocio" placeholder="Ej: Barbería El Soberano">
            <label>WhatsApp (Sin el +):</label>
            <input type="text" id="ws_num" placeholder="5493764263698">
        </div>

        <div class="section">
            <label>CONFIGURAR HORARIOS DE ATENCIÓN</label>
            <div id="contenedor_dias"></div>
        </div>

        <button class="btn-generar" onclick="fabricarCodigo()">Generar Módulo de Turnos 🚀</button>
        
        <textarea id="codigo_salida" readonly></textarea>
        <div id="copy_msg" class="copy-info">¡CÓDIGO GENERADO! COPIA Y PEGA EN TU TARJETA DIGITAL</div>
    </div>

<script>
    const diasSemana = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado", "Domingo"];
    const contenedor = document.getElementById('contenedor_dias');

    diasSemana.forEach(dia => {
        const div = document.createElement('div');
        div.className = 'grid-horarios';
        div.innerHTML = `
            <div style="color:var(--gold); font-weight:bold">${dia}</div>
            <div style="display:flex; gap:5px">
                <input type="time" class="h-ini" value="08:30" style="margin:0">
                <input type="time" class="h-fin" value="12:30" style="margin:0">
            </div>
            <div style="display:flex; gap:5px">
                <input type="time" class="h-ini-t" value="16:30" style="margin:0">
                <input type="time" class="h-fin-t" value="20:30" style="margin:0">
            </div>
            <div style="grid-column: span 3; font-size: 0.75rem;">
                <label style="display:inline; margin:0; color:#888"><input type="checkbox" class="check-cerrado" ${dia==='Domingo'?'checked':''}> Marcar como Cerrado</label>
            </div>
        `;
        contenedor.appendChild(div);
    });

    function fabricarCodigo() {
        const nombre = document.getElementById('nombre_negocio').value || "RESERVAR TURNO";
        const ws = document.getElementById('ws_num').value;
        if(!ws) return alert("Por favor, ingresa el WhatsApp.");

        let config = {};
        document.querySelectorAll('.grid-horarios').forEach((row, i) => {
            config[i] = {
                c: row.querySelector('.check-cerrado').checked,
                m1: row.querySelector('.h-ini').value, m2: row.querySelector('.h-fin').value,
                t1: row.querySelector('.h-ini-t').value, t2: row.querySelector('.h-fin-t').value
            };
        });

        const code = `
<div id="sob_modulo_root">
    <style>
        .sob-card { max-width: 400px; margin: 20px auto; border: 2px solid #D4AF37; padding: 25px; border-radius: 20px; background: #000; color: white; font-family: sans-serif; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .sob-in { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #D4AF37; border-radius: 10px; background: rgba(255,255,255,0.05); color: white; box-sizing: border-box; color-scheme: dark; font-size: 16px; }
        .sob-lab { font-size: 0.75rem; color: #D4AF37; font-weight: bold; text-transform: uppercase; display: block; margin-top: 15px; }
        .sob-btn { background: transparent; color: #D4AF37; border: 2px solid #D4AF37; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; text-transform: uppercase; }
        .sob-btn:hover { background: #D4AF37; color: #000; box-shadow: 0 0 20px #D4AF37; }
        .sob-f { text-align: center; font-size: 0.7rem; margin-top: 20px; border-top: 1px solid #333; padding-top: 15px; color: #888; }
    </style>

    <div id="sob_v" class="sob-card">
        <h3 style="text-align: center; color: #D4AF37; margin: 0; letter-spacing: 2px;">📅 ${nombre.toUpperCase()}</h3>
        <label class="sob-lab">Tu Nombre:</label>
        <input type="text" id="s_n" class="sob-in" placeholder="Nombre y Apellido">
        <label class="sob-lab">Día del Turno:</label>
        <input type="date" id="s_f" class="sob-in">
        <label class="sob-lab">Hora Deseada:</label>
        <input type="time" id="s_h" class="sob-in">
        <button class="sob-btn" onclick="s_enviar()">Solicitar Turno Ahora</button>
        <div class="sob-f">Desarrollado por <a href="https://portaldigitalsoft.github.io/PORTAL_DIGITAL_SOFTWARE_TD/" style="color:#D4AF37; text-decoration:none; font-weight:bold;">Portal Digital</a></div>
    </div>

    <script>
        const s_C = { w: "${ws}", h: ${JSON.stringify(config)} };
        document.getElementById('s_f').min = new Date().toISOString().split('T')[0];

        function s_enviar() {
            const n = document.getElementById('s_n').value.trim();
            const f = document.getElementById('s_f').value;
            const h = document.getElementById('s_h').value;
            if(!n || !f || !h) return alert("Por favor, completa todos los datos.");
            
            const lock = localStorage.getItem("s_l_" + s_C.w);
            if(lock && (Date.now() - lock < 86400000)) return alert("Estimado/a, ya recibimos una solicitud tuya. Intenta nuevamente en 24 horas.");

            const dia = (new Date(f + 'T00:00:00').getDay() + 6) % 7;
            const conf = s_C.h[dia];
            if(conf.c) return alert("Lo sentimos, este día el establecimiento se encuentra cerrado.");

            const tM = (t) => { const [hrs, mins] = t.split(':').map(Number); return hrs * 60 + mins; };
            const hE = tM(h);
            const ok = (hE >= tM(conf.m1) && hE <= tM(conf.m2)) || (hE >= tM(conf.t1) && hE <= tM(conf.t2));
            if(!ok) return alert("El horario seleccionado está fuera de nuestro rango de atención comercial.");

            if(f === new Date().toISOString().split('T')[0]) {
                const ahora = new Date();
                if(hE < (ahora.getHours()*60 + ahora.getMinutes() + 60)) return alert("Los turnos para hoy deben pedirse con al menos 1 hora de anticipación.");
            }

            localStorage.setItem("s_l_" + s_C.w, Date.now());
            const msg = "Hola! Soy *" + n + "*, quiero reservar un turno para el día *" + f.split('-').reverse().join('/') + "* a las *" + h + "*.";
            window.open("https://wa.me/"+s_C.w+"?text="+encodeURIComponent(msg));
        }
    <\/script>
</div>`;

        const out = document.getElementById('codigo_salida');
        out.value = code;
        out.style.display = 'block';
        document.getElementById('copy_msg').style.display = 'block';
        out.select();
    }
</script>
</body>
</html>
